# ══════════════════════════════════════════════════════════════════
# Docker Compose — Face Mask & Emotion Detection Full Stack
# Services: backend (Django), frontend (Vite), db (SQL Server),
#           mongo, redis, celery
# GPU: NVIDIA RTX 2060 via nvidia-container-toolkit
# Usage:
#   docker compose up -d              # start all services
#   docker compose up --build -d      # rebuild and start
#   docker compose logs -f backend    # follow backend logs
# ══════════════════════════════════════════════════════════════════

services:

  # ── SQL Server 2022 ──────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: faceguard_sqlserver
    environment:
      ACCEPT_EULA:            "Y"
      SA_PASSWORD:            "${SQL_SERVER_PASS:-YourStrong!Pass123}"
      MSSQL_PID:              "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "${SQL_SERVER_PASS:-YourStrong!Pass123}" -Q "SELECT 1" || exit 1
      interval: 20s
      retries: 10
      start_period: 30s
    networks:
      - faceguard_net

  # ── MongoDB ───────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: faceguard_mongo
    environment:
      MONGO_INITDB_DATABASE: face_mask_emotion
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      retries: 5
    networks:
      - faceguard_net

  # ── Redis (Celery broker + Channels) ──────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: faceguard_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    networks:
      - faceguard_net

  # ── Django Backend (GPU) ──────────────────────────────────────────
  backend:
    build:
      context:    ./project/backend
      dockerfile: Dockerfile
    container_name: faceguard_backend_v2
    command: >
      sh -c "python manage.py migrate --no-input &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-change-me}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=*
      - SQL_SERVER_HOST=db
      - SQL_SERVER_DB=FaceMaskEmotionDB
      - SQL_SERVER_USER=sa
      - SQL_SERVER_PASS=${SQL_SERVER_PASS:-YourStrong!Pass123}
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=face_mask_emotion
      - REDIS_URL=redis://redis:6379
      - ML_MODELS_DIR=/app/ml_models
    volumes:
      - ./project/backend:/app
      - ./project/ml/models:/app/ml_models:ro
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    # GPU passthrough — requires nvidia-container-toolkit on host
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver:       nvidia
    #           count:        1
    #           capabilities: [gpu]
    networks:
      - faceguard_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/detect/models/"]
      interval: 30s
      retries: 5
      start_period: 60s

  # ── Celery Worker ─────────────────────────────────────────────────
  celery:
    build:
      context:    ./project/backend
      dockerfile: Dockerfile
    container_name: faceguard_celery_v2
    command: celery -A config worker --loglevel=info --concurrency=2
    environment:
      - SQL_SERVER_HOST=db
      - SQL_SERVER_DB=FaceMaskEmotionDB
      - SQL_SERVER_USER=sa
      - SQL_SERVER_PASS=${SQL_SERVER_PASS:-YourStrong!Pass123}
      - MONGODB_URI=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379
      - ML_MODELS_DIR=/app/ml_models
    volumes:
      - ./project/backend:/app
      - ./project/ml/models:/app/ml_models:ro
    depends_on:
      - backend
      - redis
    networks:
      - faceguard_net

  # ── React Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context:    ./project/frontend
      dockerfile: Dockerfile
    container_name: faceguard_frontend_v2
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - faceguard_net
    environment:
      - VITE_API_URL=http://backend:8000/api

# ── Volumes ────────────────────────────────────────────────────────
volumes:
  sqlserver_data:
  mongo_data:
  redis_data:
  backend_media:

# ── Network ────────────────────────────────────────────────────────
networks:
  faceguard_net:
    driver: bridge
